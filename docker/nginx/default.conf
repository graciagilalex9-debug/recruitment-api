# Nginx vhost for the Recruitment API.
# Serves Laravel's public/ dir and hands PHP off to the php-fpm container.
server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    index index.php;

    charset utf-8;

    # Standard Laravel front-controller routing.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # Pass PHP to php-fpm (service name "app", port 9000).
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Don't expose hidden files (except ACME challenge).
    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 32M;
}
