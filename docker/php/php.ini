; App-level PHP overrides (loaded last, wins over defaults).
memory_limit = 512M

; The Excel report can build large spreadsheets — give uploads/POSTs room.
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 120

; OPcache: fine for dev; in prod you'd also set validate_timestamps=0.
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1

; Sensible date default so Carbon/logs aren't UTC-ambiguous in dev.
date.timezone = UTC
