openapi: 3.1.0
info:
  title: Recruitment API
  version: 1.0.0
  description: >
    API to manage job candidatures and evaluators.
    This file is the source of truth for the HTTP contract (spec-first): the code is
    implemented to satisfy it. Each capability adds its endpoints here.
servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Candidatures
    description: Registering and managing candidatures

paths:
  /candidatures:
    post:
      tags: [Candidatures]
      summary: Register a candidature
      operationId: registerCandidature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCandidatureRequest'
      responses:
        '201':
          description: The candidature was registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidatureResource'
        '409':
          description: A candidature with this email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: The input is missing required fields or is malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /candidatures/{id}/validation:
    get:
      tags: [Candidatures]
      summary: Evaluate a candidature's eligibility
      operationId: validateCandidature
      parameters:
        - name: id
          in: path
          required: true
          description: Candidature ULID
          schema:
            type: string
          example: 01J9Z8K3Q7R5X2M4B6T8V0W1C2
      responses:
        '200':
          description: The eligibility report (per-rule breakdown).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationReportResource'
        '404':
          description: No candidature with that id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /evaluators:
    post:
      tags: [Evaluators]
      summary: Create an evaluator
      operationId: createEvaluator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvaluatorRequest'
      responses:
        '201':
          description: The evaluator was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluatorResource'
        '422':
          description: Missing or malformed name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /candidatures/{id}/evaluator:
    put:
      tags: [Candidatures]
      summary: Assign an evaluator to a candidature
      operationId: assignEvaluator
      parameters:
        - name: id
          in: path
          required: true
          description: Candidature ULID
          schema:
            type: string
          example: 01J9Z8K3Q7R5X2M4B6T8V0W1C2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignEvaluatorRequest'
      responses:
        '200':
          description: The evaluator was assigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResource'
        '404':
          description: Candidature or evaluator not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '409':
          description: The candidature is not eligible for assignment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Missing or malformed evaluator_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /candidatures/auto-assign:
    post:
      tags: [Candidatures]
      summary: Bulk auto-assign unassigned, eligible candidatures to the least-loaded evaluator
      operationId: autoAssignCandidatures
      responses:
        '200':
          description: Summary of the bulk assignment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoAssignmentResource'
        '409':
          description: There are eligible candidatures to assign but no evaluators exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /candidatures/consolidated:
    get:
      tags: [Candidatures]
      summary: Consolidated listing of assigned candidatures (sortable, filterable, paginated)
      operationId: consolidatedListing
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            enum: [full_name, email, years_of_experience, evaluator_name, assigned_at, evaluator_total]
            default: years_of_experience
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 15 }
        - name: filter
          in: query
          style: deepObject
          explode: true
          description: "Filter by a listed column, e.g. filter[full_name]=Ada (prefix for text, exact for number/date)."
          schema:
            type: object
            properties:
              full_name: { type: string }
              email: { type: string }
              evaluator_name: { type: string }
              years_of_experience: { type: integer }
              assigned_at: { type: string }
      responses:
        '200':
          description: A page of the consolidated listing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidatedListing'
        '422':
          description: Invalid sort / direction / pagination parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /candidatures/{id}/summary:
    get:
      tags: [Candidatures]
      summary: Consolidated summary of a candidature (data + validations + evaluator)
      operationId: candidatureSummary
      parameters:
        - name: id
          in: path
          required: true
          description: Candidature ULID
          schema: { type: string }
          example: 01J9Z8K3Q7R5X2M4B6T8V0W1C2
      responses:
        '200':
          description: The candidature summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidatureSummary'
        '404':
          description: No candidature with that id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

components:
  schemas:
    RegisterCandidatureRequest:
      type: object
      required: [full_name, email, years_of_experience, cv]
      properties:
        full_name:
          type: string
          maxLength: 255
          example: Ada Lovelace
        email:
          type: string
          format: email
          maxLength: 255
          example: ada@example.com
        years_of_experience:
          type: integer
          minimum: 0
          example: 7
        cv:
          type: string
          example: Mathematician and first programmer.

    CandidatureResource:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Candidature'

    Candidature:
      type: object
      properties:
        id:
          type: string
          description: ULID
          example: 01J9Z8K3Q7R5X2M4B6T8V0W1C2
        full_name:
          type: string
          example: Ada Lovelace
        email:
          type: string
          format: email
          example: ada@example.com
        years_of_experience:
          type: integer
          example: 7
        cv:
          type: string
          example: Mathematician and first programmer.
        created_at:
          type: string
          format: date-time
          example: '2026-07-03T18:30:00+00:00'

    ValidationReportResource:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ValidationReport'

    ValidationReport:
      type: object
      properties:
        candidature_id:
          type: string
          example: 01J9Z8K3Q7R5X2M4B6T8V0W1C2
        valid:
          type: boolean
          example: false
        rules:
          type: array
          items:
            $ref: '#/components/schemas/RuleResult'

    RuleResult:
      type: object
      properties:
        rule:
          type: string
          example: minimum_experience
        passed:
          type: boolean
          example: false
        reason:
          type: string
          example: 'Requires at least 2 years of experience; has 1.'

    CreateEvaluatorRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
          example: Grace Hopper

    EvaluatorResource:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Evaluator'

    Evaluator:
      type: object
      properties:
        id:
          type: string
          example: 01J9ZC5K3Q7R5X2M4B6T8V0W1C2
        name:
          type: string
          example: Grace Hopper
        created_at:
          type: string
          format: date-time

    AssignEvaluatorRequest:
      type: object
      required: [evaluator_id]
      properties:
        evaluator_id:
          type: string
          description: Evaluator ULID
          example: 01J9ZC5K3Q7R5X2M4B6T8V0W1C2

    AssignmentResource:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Assignment'

    Assignment:
      type: object
      properties:
        candidature_id:
          type: string
          example: 01J9Z8K3Q7R5X2M4B6T8V0W1C2
        evaluator_id:
          type: string
          example: 01J9ZC5K3Q7R5X2M4B6T8V0W1C2
        assigned_at:
          type: string
          format: date-time

    AutoAssignmentResource:
      type: object
      properties:
        data:
          type: object
          properties:
            assigned:
              type: integer
              example: 7
            skipped_ineligible:
              type: integer
              example: 2

    ConsolidatedListing:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ConsolidatedRow'
        meta:
          type: object
          properties:
            current_page: { type: integer, example: 1 }
            per_page: { type: integer, example: 15 }
            total: { type: integer, example: 42 }
            last_page: { type: integer, example: 3 }

    ConsolidatedRow:
      type: object
      properties:
        full_name: { type: string, example: Ada Lovelace }
        email: { type: string, example: ada@example.com }
        years_of_experience: { type: integer, example: 9 }
        evaluator_name: { type: string, example: Grace Hopper }
        assigned_at: { type: string, format: date-time }
        evaluator_total: { type: integer, example: 3 }
        evaluator_candidate_emails: { type: string, example: "ada@example.com,alan@example.com" }

    CandidatureSummary:
      type: object
      properties:
        data:
          type: object
          properties:
            id: { type: string }
            full_name: { type: string }
            email: { type: string }
            years_of_experience: { type: integer }
            cv: { type: string }
            created_at: { type: string, format: date-time }
            valid: { type: boolean }
            validations:
              type: object
              properties:
                passed:
                  type: array
                  items:
                    type: object
                    properties:
                      rule: { type: string }
                      reason: { type: string }
                failed:
                  type: array
                  items:
                    type: object
                    properties:
                      rule: { type: string }
                      reason: { type: string }
            evaluator:
              type: object
              nullable: true
              properties:
                name: { type: string }
                assigned_at: { type: string, format: date-time }

    ErrorMessage:
      type: object
      properties:
        message:
          type: string
          example: A candidature with email ada@example.com already exists.

    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: The email field must be a valid email address.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email:
              - The email field must be a valid email address.
